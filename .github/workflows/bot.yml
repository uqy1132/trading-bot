name: Trading Bot Scheduler

on:
  schedule:
    - cron: '0 */4 * * *'  # Setiap 4 jam
    - cron: '0 1 * * *'    # Jam 08:00 WIB (01:00 UTC)
    - cron: '0 5 * * *'    # Jam 12:00 WIB (05:00 UTC)
    - cron: '0 9 * * *'    # Jam 16:00 WIB (09:00 UTC)
    - cron: '0 13 * * *'   # Jam 20:00 WIB (13:00 UTC)
  workflow_dispatch:         # Bisa juga dijalankan manual

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout kode
        uses: actions/checkout@v3

      - name: Setup Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements_vps.txt') }}

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements_vps.txt
          pip install ta groq scipy

      - name: Buat config .env
        run: |
          mkdir -p config
          cat > config/.env << EOF
          GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}
          DISCORD_WEBHOOK_URL=${{ secrets.DISCORD_WEBHOOK_URL }}
          MODAL_TOTAL=${{ secrets.MODAL_TOTAL }}
          RISK_PER_TRADE=0.015
          MAX_DRAWDOWN_HARIAN=0.03
          MAX_DRAWDOWN_TOTAL=0.15
          TARGET_BULANAN=0.04
          BINANCE_TESTNET=true
          EOF

      - name: Buat folder logs
        run: mkdir -p logs

      - name: Jalankan scan bot
        run: python -c "
          import sys, urllib3
          urllib3.disable_warnings()
          sys.path.append('.')
          from scheduler import scan_dan_alert
          scan_dan_alert()
          "
