name: Trading Bot Scheduler

on:
  schedule:
    - cron: '0 */4 * * *'
    - cron: '0 1 * * *'
    - cron: '0 5 * * *'
    - cron: '0 9 * * *'
    - cron: '0 13 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout kode
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements_vps.txt') }}

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements_vps.txt
          pip install ta groq scipy requests python-dotenv

      - name: Buat config .env
        run: |
          mkdir -p config logs
          cat > config/.env << 'EOF'
          GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}
          DISCORD_WEBHOOK_URL=${{ secrets.DISCORD_WEBHOOK_URL }}
          MODAL_TOTAL=${{ secrets.MODAL_TOTAL }}
          RISK_PER_TRADE=0.015
          MAX_DRAWDOWN_HARIAN=0.03
          MAX_DRAWDOWN_TOTAL=0.15
          TARGET_BULANAN=0.04
          BINANCE_TESTNET=true
          EOF
      - name: Jalankan scan bot
        run: python run_scan.py
