services:
  - type: web
    name: trading-bot
    runtime: python
    buildCommand: "pip install -r requirements.txt && cd frontend && npm install && npm run build"
    startCommand: "uvicorn api_server:app --host 0.0.0.0 --port $PORT"
    plan: free
    envVars:
      - key: PYTHONPATH
        value: /opt/render/project/src
      - key: OKX_API_KEY
        sync: false
      - key: OKX_SECRET
        sync: false
      - key: OKX_PASSPHRASE
        sync: false
      - key: DISCORD_WEBHOOK_URL
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: LIVE_MODE
        value: "false"
      - key: MODAL_USDT
        value: "1000"
